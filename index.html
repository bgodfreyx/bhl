<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour Prototype</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .container {
            width: 90%;
            max-width: 600px;
            border: 2px dashed #999;
            padding: 40px;
            text-align: center;
            background-color: #fff;
        }

        h1 {
            margin-bottom: 40px;
            font-weight: normal;
        }

        .button {
            display: inline-block;
            padding: 15px 30px;
            border: 2px solid #333;
            text-decoration: none;
            color: #333;
            font-size: 16px;
            background-color: transparent;
            transition: all 0.2s ease;
        }

        .button:hover {
            background-color: #333;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to the Beehive and Lion Houses Historic Site</h1>
        <a href="welcome-01.html" class="button">Start Tour</a>
    </div>

</body>
</html>
