<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome Galleries</title>
  <style>
    :root {
      --bg:#f5f5f5; --panel:#fff; --text:#111; --muted:#666; --border:#ddd; --shadow:0 6px 18px rgba(0,0,0,.05); --controls-height:92px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    .app{max-width:560px;margin:0 auto;padding:16px 16px calc(var(--controls-height)+24px)}
    .topbar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .back{text-decoration:none;border:1px solid var(--border);padding:8px 12px;border-radius:8px;color:var(--text);background:var(--panel);box-shadow:var(--shadow)}
    h1{font-size:1.2rem;margin:0;line-height:1.2}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
    .tour-heading{margin:0 0 12px;font-size:1.15rem;line-height:1.25}
    .tour-description{margin:0 0 14px;font-size:.95rem;line-height:1.5}
    .start-button{display:block;width:100%;text-align:center;text-decoration:none;background:var(--text);color:#fff;border-radius:12px;padding:14px 16px;font-weight:700;border:1px solid var(--text)}
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <a class="back" href="index.html">← Back</a>
      <h1>Welcome Galleries</h1>
    </div>
    <section class="card">
      <h2 class="tour-heading">Discover the most historic homes at Temple Square</h2>
      <p class="tour-description">This opening experience introduces the historic homes and sets the stage for the tours that follow.</p>
      <a class="start-button" href="01_launch_point.html">Start Tour ▶</a>
    </section>
  </div>
</body>
</html>
